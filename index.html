<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino da Semana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1e1b19;
    --bg-elevated: #2a2521;
    --bg-card: #25201d;
    --steel: #5b5651;
    --steel-light: #8a847d;
    --chalk: #ede6d6;
    --chalk-dim: #b8b0a1;
    --rust: #c15b33;
    --rust-dim: #8f4327;
    --moss: #6b7a5e;
    --radius: 4px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.025) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,0.02) 0%, transparent 45%);
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust);
    margin: 0 0 6px;
  }

  h1.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.02em;
    line-height: 0.95;
    margin: 0 0 6px;
    color: var(--chalk);
  }

  .subtitle {
    color: var(--chalk-dim);
    font-size: 15px;
    margin: 0 0 40px;
    line-height: 1.5;
  }

  .save-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--moss);
    margin-bottom: 16px;
    padding: 8px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius);
    border: 1px solid #3a332e;
    flex-wrap: wrap;
  }

  .save-status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--moss);
    flex-shrink: 0;
  }

  .save-status .dot.saving {
    background: var(--rust);
    animation: pulse 0.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .save-status .backup-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--steel);
    color: var(--chalk-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .save-status .backup-btn:hover {
    border-color: var(--rust);
    color: var(--rust);
  }

  .save-status .restore-btn {
    background: none;
    border: 1px solid var(--steel);
    color: var(--chalk-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .save-status .restore-btn:hover {
    border-color: var(--moss);
    color: var(--moss);
  }

  .bar {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 8px 0 0;
  }

  .bar::before {
    content: "";
    position: absolute;
    left: 28px;
    top: 28px;
    bottom: 28px;
    width: 4px;
    background: linear-gradient(180deg, var(--steel), var(--steel-light) 50%, var(--steel));
    border-radius: 2px;
    z-index: 0;
  }

  @media (min-width: 600px) {
    .bar { flex-direction: row; align-items: center; gap: 10px; padding: 28px 0 0; }
    .bar::before {
      left: 28px; right: 28px; top: 50%; bottom: auto; height: 4px; width: auto;
      transform: translateY(-50%);
    }
  }

  .plate {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-card);
    border: 1px solid #3a332e;
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    color: inherit;
    font: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }

  .plate:hover { border-color: var(--rust-dim); transform: translateX(2px); }
  .plate:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  @media (min-width: 600px) {
    .plate { flex-direction: column; align-items: center; text-align: center; padding: 16px 10px; gap: 10px; }
    .plate:hover { transform: translateY(-3px); }
  }

  .disc {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #6b645c, #2f2a26 70%);
    border: 3px solid var(--steel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.04em;
    color: var(--chalk);
  }

  .plate-info { flex: 1; min-width: 0; }

  .plate-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.02em;
    margin: 0 0 2px;
  }

  .plate-group {
    font-size: 13px;
    color: var(--chalk-dim);
    margin: 0 0 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .plate-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--steel-light);
    margin: 0;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--chalk-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 24px;
  }
  .back-btn:hover { color: var(--rust); }
  .back-btn:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .day-header { margin-bottom: 6px; }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    line-height: 1;
    margin: 0;
  }

  .group-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 32px;
    flex-wrap: wrap;
  }

  .group-label {
    font-size: 15px;
    color: var(--chalk-dim);
  }

  .group-input {
    background: var(--bg-elevated);
    border: 1px solid var(--steel);
    color: var(--chalk);
    font-size: 15px;
    font-family: inherit;
    padding: 5px 8px;
    border-radius: var(--radius);
    width: 220px;
    max-width: 50vw;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--steel-light);
    cursor: pointer;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 4px;
  }
  .icon-btn:hover { color: var(--rust); }
  .icon-btn:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--moss);
    margin: 0 0 20px;
  }

  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .exercise-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-card);
    border: 1px solid #3a332e;
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .exercise-row.done { opacity: 0.55; }

  .check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--steel-light);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--moss);
    font-size: 12px;
    padding: 0;
  }
  .check.checked { border-color: var(--moss); background: rgba(107,122,94,0.15); }
  .check:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .ex-name {
    flex: 1;
    min-width: 0;
    font-size: 15px;
  }
  .exercise-row.done .ex-name { text-decoration: line-through; }

  .ex-meta-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--chalk-dim);
    white-space: nowrap;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: var(--radius);
    flex-shrink: 0;
  }
  .ex-meta-btn:hover { color: var(--rust); background: rgba(193,91,51,0.08); }
  .ex-meta-btn:focus-visible { outline: 2px solid var(--rust); outline-offset: 1px; }
  .ex-meta-btn.is-empty { color: var(--steel-light); font-style: italic; }

  .ex-edit-fields {
    display: flex;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
  }

  .ex-edit-input {
    width: 0;
    flex: 1;
    min-width: 60px;
    background: var(--bg-elevated);
    border: 1px solid var(--steel);
    color: var(--chalk);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 6px;
    border-radius: var(--radius);
  }
  .ex-edit-input:focus-visible { outline: 2px solid var(--rust); outline-offset: 1px; }

  .ex-save {
    flex-shrink: 0;
    background: var(--rust);
    color: var(--chalk);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .ex-save:hover { background: var(--rust-dim); }
  .ex-save:focus-visible { outline: 2px solid var(--chalk); outline-offset: 2px; }

  .ex-edit-file label {
    font-size: 12px;
    color: var(--chalk-dim);
    display: block;
    margin-bottom: 4px;
  }
  .ex-edit-file input[type="file"] {
    font-size: 12px;
    color: var(--chalk-dim);
    max-width: 100%;
  }

  .edit-hint {
    font-size: 11px;
    color: var(--steel-light);
    line-height: 1.5;
    margin: 0;
  }

  .local-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--moss);
    margin-top: 6px;
  }

  .local-remove {
    background: none;
    border: none;
    color: var(--steel-light);
    cursor: pointer;
    font-size: 11px;
    text-decoration: underline;
  }
  .local-remove:hover { color: var(--rust); }

  .ex-play {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--rust);
    color: var(--rust);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 10px;
    padding: 0;
  }
  .ex-play:hover { background: rgba(193,91,51,0.15); }
  .ex-play:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }
  .ex-play.is-active { background: var(--rust); color: var(--chalk); }

  .video-panel {
    background: var(--bg-card);
    border: 1px solid #3a332e;
    border-radius: var(--radius);
    padding: 10px;
    margin-top: -2px;
  }

  .video-panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .video-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--steel-light);
  }

  .video-close {
    background: none;
    border: none;
    color: var(--steel-light);
    cursor: pointer;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  .video-close:hover { color: var(--rust); }
  .video-close:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .media-embed {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .media-embed iframe, .media-embed video {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .media-image {
    width: 100%;
    max-height: 360px;
    object-fit: contain;
    border-radius: var(--radius);
    background: #000;
    display: block;
  }

  .media-link {
    color: var(--rust);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-decoration: underline;
  }

  .exercise-row.editing {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .ex-edit-video {
    width: 100%;
  }

  .ex-edit-actions {
    display: flex;
    justify-content: flex-end;
  }

  .ex-delete {
    background: none;
    border: none;
    color: var(--steel-light);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .ex-delete:hover { color: var(--rust); }
  .ex-delete:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .empty-state {
    border: 1px dashed var(--steel);
    border-radius: var(--radius);
    padding: 28px 18px;
    text-align: center;
    color: var(--chalk-dim);
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .add-form {
    background: var(--bg-elevated);
    border: 1px solid #3a332e;
    border-radius: var(--radius);
    padding: 16px;
  }

  .add-form-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--steel-light);
    margin: 0 0 12px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  @media (min-width: 480px) {
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  }

  .form-row input {
    background: var(--bg-card);
    border: 1px solid var(--steel);
    color: var(--chalk);
    font-family: 'Work Sans', sans-serif;
    font-size: 14px;
    padding: 9px 10px;
    border-radius: var(--radius);
    width: 100%;
  }

  .form-row input:focus-visible { outline: 2px solid var(--rust); outline-offset: 1px; }
  .form-row input::placeholder { color: var(--steel-light); }

  .submit-btn {
    background: var(--rust);
    color: var(--chalk);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    width: 100%;
  }
  .submit-btn:hover { background: var(--rust-dim); }
  .submit-btn:focus-visible { outline: 2px solid var(--chalk); outline-offset: 2px; }

  [hidden] { display: none !important; }

  @media (max-width: 480px) {
    .exercise-row {
      flex-wrap: wrap;
      gap: 8px;
    }
    .ex-name {
      order: 1;
      flex-basis: calc(100% - 70px);
    }
    .check {
      order: 0;
    }
    .ex-play {
      order: 2;
    }
    .ex-meta-btn {
      order: 3;
      flex-basis: 100%;
      text-align: center;
      font-size: 11px;
    }
    .ex-delete {
      order: 4;
      margin-left: auto;
    }
    .exercise-row.editing .ex-name {
      flex-basis: 100%;
    }
    .ex-edit-fields {
      flex-direction: column;
    }
    .ex-edit-input {
      min-width: 100%;
    }

    .save-status {
      flex-wrap: wrap;
      gap: 4px;
    }
    .save-status .backup-btn,
    .save-status .restore-btn {
      margin-left: 0;
      font-size: 9px;
      padding: 3px 8px;
    }
  }
</style>
</head>
<body>

<div class="wrap">

  <main id="home-view">
    <p class="eyebrow">Semana de treino</p>
    <h1 class="title">MEU TREINO<br>DA SEMANA</h1>
    <p class="subtitle">Escolha um dia para ver, editar e marcar os exercícios.</p>

    <div class="save-status" id="save-status">
      <span class="dot" id="save-dot"></span>
      <span id="save-text">Dados salvos</span>
      <button class="backup-btn" id="backup-btn">📥 Backup</button>
      <button class="restore-btn" id="restore-btn">📤 Restaurar</button>
    </div>

    <div class="bar" id="bar-list"></div>
    <button class="icon-btn" id="reset-btn" style="margin-top:28px;">restaurar treino padrão</button>
  </main>

  <main id="day-view" hidden>
    <button class="back-btn" id="back-btn">← Semana</button>

    <div class="day-header">
      <h1 class="day-name" id="day-name">Segunda</h1>
    </div>
    <div class="group-row">
      <span class="group-label" id="group-display"></span>
      <input class="group-input" id="group-input" hidden>
      <button class="icon-btn" id="group-edit-btn">editar grupo</button>
    </div>

    <p class="progress" id="progress-text"></p>

    <div class="exercise-list" id="exercise-list"></div>

    <form class="add-form" id="add-form">
      <p class="add-form-title">Adicionar exercício</p>
      <div class="form-row">
        <input type="text" id="ex-name" placeholder="Nome do exercício" required>
      </div>
      <div class="form-row cols-3">
        <input type="text" id="ex-sets" placeholder="Séries (ex: 4)">
        <input type="text" id="ex-reps" placeholder="Repetições (ex: 12)">
        <input type="text" id="ex-weight" placeholder="Carga kg (opcional)">
      </div>
      <button type="submit" class="submit-btn">Adicionar</button>
    </form>
  </main>

</div>

        { name: 'Elevação de Panturrilha em Pé', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/244.gif' },

    },
    qui: {

      group: 'Abdômen e Core',
      exercises: [

        { name: 'Abdominal com Elevação de Perna', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/251.gif' },
        { name: 'Mountain Climber', video: 'https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyN25uZW5iaTVpOWh3MDFjOXd3amZjeDhhb2g3MXZvNTFhMmU1bWN2MCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/bWYc47O3jSef6/200w.gif' },
        { name: 'Prancha', video: 'https://grandeatleta.com.br/wp-content/uploads/2018/06/Prancha-abdominal-Ponte-ventral.gif' },
        { name: 'Prancha com Toque no Ombro', video: 'https://thumbs.dreamstime.com/z/mulher-fazendo-torneira-no-ombro-ilustra%C3%A7%C3%A3o-de-vetor-plano-isolada-em-fundo-branco-223249517.jpg' },
        { name: 'Abdominal Infra', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/102.gif' },
        { name: 'Prancha Lateral', video: 'https://www.hipertrofia.org/blog/wp-content/uploads/2020/11/execucao-prancha-lateral.jpg' },
        { name: 'Abdominal Amplitude Máxima', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/100.gif' }
      ]
    },
    sex: {
      name: 'Sexta',
      group: 'Peito + Ombro + Tríceps + Trapézio',
      exercises: [
        { name: 'Crucifixo Articulado inclinado', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/803.gif' },
        { name: 'Supino Reto Máquina', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/749.gif' },
        { name: 'Elevação Lateral', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/158.gif' },
        { name: 'Desenvolvimento Articulado', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/146.gif' },
        { name: 'Remada Alta', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/161.gif' },
        { name: 'Encolhimento de Ombros com Halteres', video: 'https://treinomestre.com.br/wp-content/uploads/2016/01/encolhimento-de-ombros-com-halter.gif' },
        { name: 'Face Pull', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/451.gif' },
        { name: 'Mobilidade de Ombro', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/726.gif' },
        { name: 'Tríceps Pulley', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/226.gif' },
        { name: 'Tríceps Corda no Cross Over', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/230.gif' },
        { name: 'Tríceps Francês', video: 'https://cdnh.sistemasca.com/arquivos/exercicios/219.gif' },
        { name: 'Tríceps Testa', video: '' }
      ]
    }
  };

  var state = null;
  var currentDay = null;
  var editingExerciseId = null;
  var expandedVideoId = null;
  var localPreviews = {};
  var saveTimeout = null;

  function buildSearchLink(name) {
    return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' execução exercício');
  }

  function defaultState() {
    var days = {};
    DAY_ORDER.forEach(function (key) {
      var defaultDay = DAY_DEFAULTS[key];
      days[key] = {
        name: defaultDay.name,
        group: defaultDay.group,
        exercises: defaultDay.exercises.map(function (item) {
          if (typeof item === 'string') {
            return { id: uid(), name: item, sets: '', reps: '', weight: '', video: buildSearchLink(item), done: false };
          }
          return { id: uid(), name: item.name, sets: '', reps: '', weight: '', video: item.video || buildSearchLink(item.name), done: false };
        })
      };
    });
    return { days: days };
  }

  function ensureVideoDefaults(st) {
    var changed = false;
    DAY_ORDER.forEach(function (key) {
      var day = st.days[key];
      if (!day || !day.exercises) return;
      day.exercises.forEach(function (ex) {
        if (!ex.video) {
          var defaultDay = DAY_DEFAULTS[key];
          if (defaultDay) {
            var found = defaultDay.exercises.find(function (item) {
              if (typeof item === 'string') return item === ex.name;
              return item.name === ex.name;
            });
            if (found && found.video) {
              ex.video = found.video;
              changed = true;
              return;
            }
          }
          ex.video = buildSearchLink(ex.name);
          changed = true;
        }
      });
    });
    return changed;
  }

  function showSaving() {
    var dot = document.getElementById('save-dot');
    var text = document.getElementById('save-text');
    dot.className = 'dot saving';
    text.textContent = 'Salvando...';
  }

  function showSaved() {
    var dot = document.getElementById('save-dot');
    var text = document.getElementById('save-text');
    dot.className = 'dot';
    text.textContent = 'Dados salvos ✓';
    setTimeout(function() {
      text.textContent = 'Dados salvos';
    }, 2000);
  }

  function saveState() {
    showSaving();
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(function() {
      try {
        var json = JSON.stringify(state);
        localStorage.setItem(STORAGE_KEY, json);
        localStorage.setItem(BACKUP_KEY, json);
        showSaved();
      } catch (e) {
        console.error('Erro ao salvar:', e);
      }
    }, 300);
  }

  function loadState() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        state = JSON.parse(data);
        ensureVideoDefaults(state);
      } else {
        state = defaultState();
      }
      showSaved();
    } catch (e) {
      console.error('Erro ao carregar:', e);
      state = defaultState();
      showSaved();
    }
  }

  function uid() {
    return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
  }

  function createBackup() {
    try {
      var json = JSON.stringify(state);
      localStorage.setItem(BACKUP_KEY, json);
      alert('✅ Backup criado com sucesso!');
    } catch (e) {
      alert('❌ Erro ao criar backup');
    }
  }

  function restoreFromBackup() {
    try {
      var backup = localStorage.getItem(BACKUP_KEY);
      if (!backup) {
        alert('❌ Nenhum backup encontrado.');
        return;
      }
      var parsed = JSON.parse(backup);
      if (!parsed.days) {
        alert('❌ Backup inválido!');
        return;
      }
      var ok = confirm('⚠️ Isso vai substituir TODOS os dados atuais pelo backup. Continuar?');
      if (!ok) return;
      state = parsed;
      saveState();
      renderHome();
      alert('✅ Backup restaurado com sucesso!');
    } catch (e) {
      alert('❌ Erro ao restaurar backup');
    }
  }

  function renderHome() {
    var bar = document.getElementById('bar-list');
    bar.innerHTML = '';
    DAY_ORDER.forEach(function (key) {
      var day = state.days[key];
      if (!day) return;
      var total = day.exercises ? day.exercises.length : 0;
      var done = day.exercises ? day.exercises.filter(function (e) { return e.done; }).length : 0;

      var btn = document.createElement('button');
      btn.className = 'plate';
      btn.setAttribute('data-day', key);

      var countText = total === 0
        ? 'nenhum exercício ainda'
        : done + ' de ' + total + ' concluídos';

      btn.innerHTML =
        '<span class="disc">' + (day.name ? day.name.slice(0, 3).toUpperCase() : key.toUpperCase()) + '</span>' +
        '<span class="plate-info">' +
          '<p class="plate-day">' + (day.name || key) + '</p>' +
          '<p class="plate-group">' + escapeHtml(day.group || 'sem grupo definido') + '</p>' +
          '<p class="plate-count">' + countText + '</p>' +
        '</span>';

      btn.addEventListener('click', function () {
        goToDay(key);
      });

      bar.appendChild(btn);
    });
  }

  function renderDay() {
    var day = state.days[currentDay];
    if (!day) return;

    document.getElementById('day-name').textContent = day.name || currentDay;
    document.getElementById('group-display').textContent = day.group || 'sem grupo definido';
    document.getElementById('group-input').value = day.group || '';

    var total = day.exercises ? day.exercises.length : 0;
    var done = day.exercises ? day.exercises.filter(function (e) { return e.done; }).length : 0;
    var progressEl = document.getElementById('progress-text');
    progressEl.textContent = total === 0 ? '' : done + ' / ' + total + ' concluídos';

    var list = document.getElementById('exercise-list');
    list.innerHTML = '';

    if (total === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'Nenhum exercício ainda. Adicione o primeiro abaixo.';
      list.appendChild(empty);
    } else {
      day.exercises.forEach(function (ex) {
        var row = document.createElement('div');
        row.className = 'exercise-row' + (ex.done ? ' done' : '');

        if (ex.id === editingExerciseId) {
          row.classList.add('editing');
          row.innerHTML =
            '<span class="ex-name">' + escapeHtml(ex.name) + '</span>' +
            '<div class="ex-edit-fields">' +
              '<input type="text" class="ex-edit-input" data-field="sets" data-id="' + ex.id + '" value="' + escapeHtml(ex.sets) + '" placeholder="séries">' +
              '<input type="text" class="ex-edit-input" data-field="reps" data-id="' + ex.id + '" value="' + escapeHtml(ex.reps) + '" placeholder="reps">' +
              '<input type="text" class="ex-edit-input" data-field="weight" data-id="' + ex.id + '" value="' + escapeHtml(ex.weight) + '" placeholder="kg">' +
            '</div>' +
            '<input type="text" class="ex-edit-input ex-edit-video" data-field="video" data-id="' + ex.id + '" value="' + escapeHtml(ex.video) + '" placeholder="link do vídeo (YouTube, Drive...) ou gif/imagem">' +
            '<div class="ex-edit-file">' +
              '<label>ou carregar arquivo do dispositivo (mp4, mov, gif, imagem...)</label>' +
              '<input type="file" class="ex-file-input" data-id="' + ex.id + '" accept="video/*,image/*">' +
              (localPreviews[ex.id]
                ? '<div class="local-badge">arquivo carregado nesta sessão · <button type="button" class="local-remove" data-id="' + ex.id + '">remover</button></div>'
                : '') +
            '</div>' +
            '<p class="edit-hint">arquivo carregado do dispositivo funciona só nesta sessão (some ao fechar a aba). para deixar permanente, use um link hospedado (YouTube, Google Drive, etc).</p>' +
            '<div class="ex-edit-actions"><button class="ex-save" data-id="' + ex.id + '">ok</button></div>';
          list.appendChild(row);
        } else {
          var metaParts = [];
          if (ex.sets) metaParts.push(ex.sets + 'x');
          if (ex.reps) metaParts.push(ex.reps);
          if (ex.weight) metaParts.push(ex.weight + 'kg');
          var meta = metaParts.join(' ');
          var isEmpty = metaParts.length === 0;
          var hasVideo = !!ex.video || !!localPreviews[ex.id];
          var isExpanded = ex.id === expandedVideoId;

          row.innerHTML =
            '<button class="check' + (ex.done ? ' checked' : '') + '" data-id="' + ex.id + '" aria-label="Marcar como concluído">' + (ex.done ? '✓' : '') + '</button>' +
            '<span class="ex-name">' + escapeHtml(ex.name) + '</span>' +
            (hasVideo ? '<button class="ex-play' + (isExpanded ? ' is-active' : '') + '" data-id="' + ex.id + '" aria-label="Ver demonstração">▶</button>' : '') +
            '<button class="ex-meta-btn' + (isEmpty ? ' is-empty' : '') + '" data-id="' + ex.id + '">' + (isEmpty ? 'definir' : escapeHtml(meta)) + '</button>' +
            '<button class="ex-delete" data-id="' + ex.id + '" aria-label="Remover exercício">×</button>';

          list.appendChild(row);

          if (isExpanded && hasVideo) {
            var panel = document.createElement('div');
            panel.className = 'video-panel';
            var embedHtml = localPreviews[ex.id]
              ? buildLocalEmbed(localPreviews[ex.id])
              : buildMediaEmbed(ex.video);
            panel.innerHTML =
              '<div class="video-panel-head">' +
                '<span class="video-panel-title">demonstração</span>' +
                '<button class="video-close" data-id="' + ex.id + '">fechar</button>' +
              '</div>' +
              embedHtml +
              (localPreviews[ex.id] ? '<p class="edit-hint" style="margin-top:8px;">prévia carregada do dispositivo — só nesta sessão.</p>' : '');
            list.appendChild(panel);
          }
        }
      });
    }
  }

  function extractYouTubeId(url) {
    var patterns = [
      /youtu\.be\/([a-zA-Z0-9_-]{6,})/,
      /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{6,})/,
      /youtube\.com\/shorts\/([a-zA-Z0-9_-]{6,})/,
      /youtube\.com\/embed\/([a-zA-Z0-9_-]{6,})/
    ];
    for (var i = 0; i < patterns.length; i++) {
      var m = url.match(patterns[i]);
      if (m) return m[1];
    }
    return null;
  }

  function extractDriveId(url) {
    var m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return m[1];
    m = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
    if (m) return m[1];
    return null;
  }

  function buildMediaEmbed(url) {
    if (!url) return '';
    var ytId = extractYouTubeId(url);
    if (ytId) {
      return '<div class="media-embed"><iframe src="https://www.youtube.com/embed/' + ytId + '" title="Demonstração do exercício" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
    }
    var driveId = extractDriveId(url);
    if (driveId) {
      return '<div class="media-embed"><iframe src="https://drive.google.com/file/d/' + driveId + '/preview" allow="autoplay" loading="lazy"></iframe></div>';
    }
    if (/\.(gif|png|jpe?g|webp|avif)(\?.*)?$/i.test(url)) {
      return '<img class="media-image" src="' + escapeHtml(url) + '" alt="Demonstração do exercício" loading="lazy">';
    }
    if (/\.(mp4|webm|ogv|mov|m4v|avi|mkv)(\?.*)?$/i.test(url)) {
      return '<div class="media-embed"><video src="' + escapeHtml(url) + '" controls playsinline></video></div>';
    }
    if (/youtube\.com\/results\?/.test(url)) {
      return '<a class="media-link" href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">🔍 Buscar vídeos deste exercício no YouTube ↗</a>';
    }
    return '<a class="media-link" href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">Abrir link ↗</a>';
  }

  function buildLocalEmbed(preview) {
    if (preview.type === 'image') {
      return '<img class="media-image" src="' + preview.url + '" alt="Demonstração do exercício" loading="lazy">';
    }
    var mime = preview.mime || 'video/mp4';
    return '<div class="media-embed"><video controls playsinline autoplay muted>' +
      '<source src="' + preview.url + '" type="' + escapeHtml(mime) + '">' +
      'Seu navegador não consegue reproduzir este arquivo.' +
      '</video></div>';
  }

  function escapeHtml(str) {
    str = str || '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function goToDay(key) {
    currentDay = key;
    document.getElementById('home-view').hidden = true;
    document.getElementById('day-view').hidden = false;
    document.getElementById('group-input').hidden = true;
    document.getElementById('group-display').hidden = false;
    renderDay();
    window.scrollTo(0, 0);
  }

  function goHome() {
    currentDay = null;
    document.getElementById('day-view').hidden = true;
    document.getElementById('home-view').hidden = false;
    renderHome();
    window.scrollTo(0, 0);
  }

  // ---------- Eventos ----------

  document.getElementById('back-btn').addEventListener('click', goHome);

  document.getElementById('backup-btn').addEventListener('click', createBackup);
  document.getElementById('restore-btn').addEventListener('click', restoreFromBackup);

  document.getElementById('reset-btn').addEventListener('click', function () {
    var ok = window.confirm('⚠️ ATENÇÃO: Isso vai apagar TODAS as suas marcações e voltar ao treino padrão.\n\nTem certeza?');
    if (!ok) return;
    var confirm2 = window.confirm('Última chance! Todos os seus dados serão perdidos.\nContinuar?');
    if (!confirm2) return;
    state = defaultState();
    saveState();
    renderHome();
  });

  document.getElementById('group-edit-btn').addEventListener('click', function () {
    var input = document.getElementById('group-input');
    var display = document.getElementById('group-display');
    if (input.hidden) {
      input.hidden = false;
      display.hidden = true;
      input.focus();
      input.select();
    } else {
      commitGroupEdit();
    }
  });

  document.getElementById('group-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      commitGroupEdit();
    }
  });

  document.getElementById('group-input').addEventListener('blur', commitGroupEdit);

  function commitGroupEdit() {
    var input = document.getElementById('group-input');
    if (input.hidden) return;
    var val = input.value.trim();
    state.days[currentDay].group = val;
    saveState();
    input.hidden = true;
    document.getElementById('group-display').hidden = false;
    renderDay();
  }

  document.getElementById('exercise-list').addEventListener('click', function (e) {
    var target = e.target;
    if (target.classList.contains('check')) {
      var id = target.getAttribute('data-id');
      var ex = state.days[currentDay].exercises.find(function (x) { return x.id === id; });
      if (ex) {
        ex.done = !ex.done;
        saveState();
        renderDay();
      }
    } else if (target.classList.contains('ex-delete')) {
      var delId = target.getAttribute('data-id');
      if (editingExerciseId === delId) editingExerciseId = null;
      if (expandedVideoId === delId) expandedVideoId = null;
      if (localPreviews[delId]) {
        URL.revokeObjectURL(localPreviews[delId].url);
        delete localPreviews[delId];
      }
      state.days[currentDay].exercises = state.days[currentDay].exercises.filter(function (x) { return x.id !== delId; });
      saveState();
      renderDay();
    } else if (target.classList.contains('ex-meta-btn')) {
      editingExerciseId = target.getAttribute('data-id');
      renderDay();
      var firstInput = document.querySelector('.ex-edit-input[data-field="sets"]');
      if (firstInput) { firstInput.focus(); firstInput.select(); }
    } else if (target.classList.contains('ex-save')) {
      commitExerciseEdit(target.getAttribute('data-id'));
    } else if (target.classList.contains('ex-play')) {
      var playId = target.getAttribute('data-id');
      expandedVideoId = (expandedVideoId === playId) ? null : playId;
      renderDay();
    } else if (target.classList.contains('video-close')) {
      expandedVideoId = null;
      renderDay();
    } else if (target.classList.contains('local-remove')) {
      var remId = target.getAttribute('data-id');
      if (localPreviews[remId]) {
        URL.revokeObjectURL(localPreviews[remId].url);
        delete localPreviews[remId];
      }
      renderDay();
    }
  });

  document.getElementById('exercise-list').addEventListener('change', function (e) {
    if (e.target.classList.contains('ex-file-input')) {
      var fileId = e.target.getAttribute('data-id');
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      if (localPreviews[fileId]) {
        URL.revokeObjectURL(localPreviews[fileId].url);
      }
      var objectUrl = URL.createObjectURL(file);
      var mediaType = file.type.indexOf('image/') === 0 ? 'image' : 'video';
      localPreviews[fileId] = { url: objectUrl, type: mediaType, mime: file.type || '' };
      renderDay();
    }
  });

  document.getElementById('exercise-list').addEventListener('keydown', function (e) {
    if (e.target.classList.contains('ex-edit-input') && e.key === 'Enter') {
      e.preventDefault();
      commitExerciseEdit(e.target.getAttribute('data-id'));
    }
  });

  function commitExerciseEdit(id) {
    var ex = state.days[currentDay].exercises.find(function (x) { return x.id === id; });
    if (!ex) return;
    var setsInput = document.querySelector('.ex-edit-input[data-field="sets"][data-id="' + id + '"]');
    var repsInput = document.querySelector('.ex-edit-input[data-field="reps"][data-id="' + id + '"]');
    var weightInput = document.querySelector('.ex-edit-input[data-field="weight"][data-id="' + id + '"]');
    var videoInput = document.querySelector('.ex-edit-input[data-field="video"][data-id="' + id + '"]');
    if (setsInput) ex.sets = setsInput.value.trim();
    if (repsInput) ex.reps = repsInput.value.trim();
    if (weightInput) ex.weight = weightInput.value.trim();
    if (videoInput) ex.video = videoInput.value.trim();
    editingExerciseId = null;
    saveState();
    renderDay();
  }

  document.getElementById('add-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var nameInput = document.getElementById('ex-name');
    var setsInput = document.getElementById('ex-sets');
    var repsInput = document.getElementById('ex-reps');
    var weightInput = document.getElementById('ex-weight');

    var name = nameInput.value.trim();
    if (!name) return;

    state.days[currentDay].exercises.push({
      id: uid(),
      name: name,
      sets: setsInput.value.trim(),
      reps: repsInput.value.trim(),
      weight: weightInput.value.trim(),
      video: buildSearchLink(name),
      done: false
    });

    saveState();
    nameInput.value = '';
    setsInput.value = '';
    repsInput.value = '';
    weightInput.value = '';
    nameInput.focus();
    renderDay();
  });

  // ---------- Inicialização ----------

  loadState();
  renderHome();

  window.addEventListener('beforeunload', function() {
    if (state) {
      try {
        var json = JSON.stringify(state);
        localStorage.setItem(STORAGE_KEY, json);
      } catch (e) {}
    }
  });

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') {
      if (state) {
        try {
          var json = JSON.stringify(state);
          localStorage.setItem(STORAGE_KEY, json);
        } catch (e) {}
      }
    }
  });

})();
</script>
